name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  foundation:
    name: Foundation validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docs check
        run: ./scripts/docs-check.sh

      - name: Layout verification
        run: ./scripts/verify-layout.sh

  go:
    name: Go build & test
    runs-on: ubuntu-latest
    needs: foundation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: go.sum

      - name: Download modules
        run: go mod download

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build binaries
        run: make build

  frontend:
    name: Frontend scripts
    runs-on: ubuntu-latest
    needs: foundation
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install (if lockfile present)
        run: |
          if [ -f package-lock.json ]; then npm ci --ignore-scripts; else npm install --ignore-scripts; fi

      - name: Lint script
        run: npm run lint

      - name: Test script
        run: npm run test
